name: Firebase Distribute

# Manual-only workflow — CI doesn't auto-distribute every push. Trigger
# from the GitHub Actions tab when ready to send a beta build.
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes (Firebase tester email body). Leave blank to use AppStore/ko/release_notes_v1.0.0.txt"
        required: false
        type: string
      tester_groups:
        description: "Firebase tester group aliases (comma-separated)"
        required: false
        default: "beta-testers"
        type: string

jobs:
  distribute:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      # Maintainer must add these as repository / environment secrets:
      #   FIREBASE_APP_ID                 — required
      #   GOOGLE_APPLICATION_CREDENTIALS  — repo secret with the JSON file
      #                                     contents, written to disk below
      #   APPLE_AUTHKEY_BASE64           — App Store Connect API key (.p8) base64
      #   APPLE_AUTHKEY_ID, APPLE_ISSUER_ID — App Store Connect API metadata
      #   APPLE_DIST_CERT_BASE64         — Distribution .p12 base64
      #   APPLE_DIST_CERT_PASSWORD       — .p12 password
      #   APPLE_PROVISIONING_PROFILE_BASE64 — ad-hoc .mobileprovision base64
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_TESTER_GROUPS: ${{ inputs.tester_groups }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      EXPORT_METHOD: ad-hoc

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # Restore Firebase service account JSON from secret to a disk file.
      - name: Restore Firebase service account
        run: |
          echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" \
            | base64 --decode > $RUNNER_TEMP/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> $GITHUB_ENV

      # Restore Apple Distribution cert + provisioning profile.
      - name: Install Apple signing assets
        env:
          DIST_CERT_BASE64: ${{ secrets.APPLE_DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          # Create a temporary keychain isolated from the runner default.
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 distribution cert.
          echo "$DIST_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g | xargs)

          # Install the provisioning profile.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/jlptdeck-adhoc.mobileprovision"

      - name: Distribute via fastlane
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JLPTDeck-ipa
          path: build/fastlane/*.ipa
          retention-days: 14
