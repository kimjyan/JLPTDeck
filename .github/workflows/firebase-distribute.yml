name: Firebase Distribute

# Manual-only workflow — CI doesn't auto-distribute every push. Trigger
# from the GitHub Actions tab when ready to send a beta build.
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes (Firebase tester email body). Leave blank to use AppStore/ko/release_notes_v1.0.0.txt"
        required: false
        type: string
      tester_groups:
        description: "Firebase tester group aliases (comma-separated)"
        required: false
        default: "beta-testers"
        type: string

jobs:
  distribute:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      # Maintainer must add these as repository / environment secrets:
      #   FIREBASE_APP_ID                 — required
      #   GOOGLE_APPLICATION_CREDENTIALS  — repo secret with the JSON file
      #                                     contents, written to disk below
      #   APPLE_AUTHKEY_BASE64           — App Store Connect API key (.p8) base64
      #   APPLE_AUTHKEY_ID, APPLE_ISSUER_ID — App Store Connect API metadata
      #   APPLE_DIST_CERT_BASE64         — Distribution .p12 base64
      #   APPLE_DIST_CERT_PASSWORD       — .p12 password
      #   APPLE_PROVISIONING_PROFILE_BASE64 — ad-hoc .mobileprovision base64
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_TESTER_GROUPS: ${{ inputs.tester_groups }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      EXPORT_METHOD: ad-hoc

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # Restore Firebase service account JSON from secret to a disk file.
      - name: Restore Firebase service account
        run: |
          echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" \
            | base64 --decode > $RUNNER_TEMP/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> $GITHUB_ENV

      # Restore Apple Distribution cert + provisioning profile.
      # Diagnostic mode: each substep guards with a clear message so the
      # workflow log pinpoints which secret / decode / import step
      # actually failed.
      - name: Install Apple signing assets
        env:
          DIST_CERT_BASE64: ${{ secrets.APPLE_DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          # ---- 1. Verify secrets exist (length-only, no value leak) ----
          if [ -z "$DIST_CERT_BASE64" ]; then
            echo "::error::APPLE_DIST_CERT_BASE64 secret is empty or unset"
            exit 1
          fi
          if [ -z "$DIST_CERT_PASSWORD" ]; then
            echo "::error::APPLE_DIST_CERT_PASSWORD secret is empty or unset"
            exit 1
          fi
          if [ -z "$PROFILE_BASE64" ]; then
            echo "::error::APPLE_PROVISIONING_PROFILE_BASE64 secret is empty or unset"
            exit 1
          fi
          echo "secret lengths: cert=${#DIST_CERT_BASE64}, pwd=${#DIST_CERT_PASSWORD}, profile=${#PROFILE_BASE64}"

          # ---- 2. Decode base64 (strip whitespace defensively — macOS
          # base64 wraps at 76 cols by default, and that survives copy
          # into GitHub secrets) ----
          echo "$DIST_CERT_BASE64" | tr -d '[:space:]' | base64 --decode > $RUNNER_TEMP/dist.p12
          echo "$PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode > $RUNNER_TEMP/profile.mobileprovision

          ls -l $RUNNER_TEMP/dist.p12 $RUNNER_TEMP/profile.mobileprovision
          file $RUNNER_TEMP/dist.p12
          file $RUNNER_TEMP/profile.mobileprovision

          # Sanity — a valid .p12 starts with the ASN.1 SEQUENCE bytes 30 82
          head -c 4 $RUNNER_TEMP/dist.p12 | xxd | head -1
          if ! head -c 2 $RUNNER_TEMP/dist.p12 | xxd | grep -q '^00000000: 3082'; then
            echo "::error::Decoded .p12 does not look like ASN.1 (wrong base64? cert without private key? exported as .cer instead of .p12?)"
            exit 1
          fi

          # ---- 3. Create + unlock temp keychain ----
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # ---- 4. Import .p12 with verbose error capture ----
          # Common failure: wrong password → "MAC verification failed",
          # not "parameters invalid". "parameters invalid" usually means
          # bad ASN.1 = bad base64 OR exported a .cer instead of .p12.
          if ! security import $RUNNER_TEMP/dist.p12 \
               -k "$KEYCHAIN_PATH" \
               -P "$DIST_CERT_PASSWORD" \
               -A \
               -t cert -f pkcs12 \
               -T /usr/bin/codesign -T /usr/bin/security 2>&1; then
            echo "::error::security import failed. Re-export the .p12 from Keychain Access selecting BOTH the Apple Distribution certificate AND its private key, then base64 via: base64 -i dist.p12 | tr -d '\n' | pbcopy"
            exit 1
          fi

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g | xargs)

          # Show installed identities (one-liner — does not leak the key)
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # ---- 5. Install provisioning profile ----
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/jlptdeck-adhoc.mobileprovision"
          echo "Provisioning profile installed."

      - name: Distribute via fastlane
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JLPTDeck-ipa
          path: build/fastlane/*.ipa
          retention-days: 14
